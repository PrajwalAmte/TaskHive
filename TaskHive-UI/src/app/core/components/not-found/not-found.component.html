<div class="terminal-container not-found-container">
  <div class="terminal-content">
    <div class="error-message">{{ randomError }}</div>
    <div class="command-line">
      <span class="prompt">$</span>
      <span class="error-code">404</span>
    </div>
    <div class="suggestions">
      <p>Try one of the following commands:</p>
      <ul>
        <li><code>cd /tasks</code> - Return to task list</li>
        <li><code>help</code> - View available commands</li>
      </ul>
    </div>
    <div class="links">
      <a routerLink="/tasks" class="terminal-link">$ cd /tasks</a>
    </div>
  </div>
</div>
