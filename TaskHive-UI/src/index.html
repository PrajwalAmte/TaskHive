<!DOCTYPE html>
<html lang="en">
  <head>
    <title>TaskHive</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A terminal-themed task management application" />
    <base href="/">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
  </head>
  <body>
    <app-root>
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Roboto Mono', monospace; color: #757575;">
        $ Loading TaskHive...<span style="display: inline-block; width: 8px; height: 16px; background-color: #757575; animation: blink 1s infinite; margin-left: 4px;"></span>
        <style>
          @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
          }
        </style>
      </div>
    </app-root>
  </body>
</html>
